<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 230" width="200" height="230">
  <defs>
    <linearGradient id="cloud-dancer-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F2E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0EEE6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D9D5C8;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="charcoal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3A3A3A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1F1F1F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="warm-gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A876;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6F47;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cloud-border" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0EEE6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="inner-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#F0EEE6;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="emblem-elegant" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0EEE6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9A876;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow-cd" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-cd">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ESTABLISHED text ABOVE the shield -->
  <text x="100" y="18" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="normal" fill="#8B6F47" letter-spacing="4">— ESTABLISHED —</text>

  <g filter="url(#shadow-cd)" transform="translate(0, 10)">
    <path d="M 100 15 L 175 45 L 175 110 Q 175 170, 100 200 Q 25 170, 25 110 L 25 45 Z"
          fill="url(#cloud-border)"
          stroke="#D9D5C8"
          stroke-width="0.5"/>

    <path d="M 100 22 L 168 50 L 168 110 Q 168 165, 100 192 Q 32 165, 32 110 L 32 50 Z"
          fill="url(#warm-gold)"/>

    <path d="M 100 28 L 162 54 L 162 110 Q 162 160, 100 185 Q 38 160, 38 110 L 38 54 Z"
          fill="url(#cloud-dancer-main)"/>

    <path d="M 100 33 L 158 56 L 158 110 Q 158 157, 100 181 Q 42 157, 42 110 L 42 56 Z"
          fill="none"
          stroke="#C9A876"
          stroke-width="0.8"
          opacity="0.7"/>

    <path d="M 100 38 L 154 60 L 154 110 Q 154 152, 100 175 Q 46 152, 46 110 L 46 60 Z"
          fill="url(#charcoal-grad)"/>

    <path d="M 100 38 L 154 60 L 154 85 Q 130 78, 100 78 Q 70 78, 46 85 L 46 60 Z"
          fill="url(#inner-glow)"
          opacity="0.15"/>
  </g>

  <!-- Brand text on charcoal (with shield translate offset +10) -->
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F0EEE6" letter-spacing="2">INVISIBLE</text>
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="normal" fill="#C9A876" letter-spacing="5">N E T</text>

  <line x1="70" y1="108" x2="130" y2="108" stroke="#C9A876" stroke-width="0.7" opacity="0.9"/>
  <circle cx="100" cy="108" r="1.5" fill="#C9A876"/>

  <!-- Central emblem (with offset +10) - nodes in Cloud Dancer -->
  <g filter="url(#glow-cd)">
    <circle cx="78" cy="130" r="2" fill="#F0EEE6" opacity="0.9"/>
    <circle cx="122" cy="130" r="2" fill="#F0EEE6" opacity="0.9"/>
    <circle cx="78" cy="170" r="2" fill="#F0EEE6" opacity="0.9"/>
    <circle cx="122" cy="170" r="2" fill="#F0EEE6" opacity="0.9"/>

    <line x1="78" y1="130" x2="100" y2="150" stroke="#F0EEE6" stroke-width="0.6" opacity="0.5"/>
    <line x1="122" y1="130" x2="100" y2="150" stroke="#F0EEE6" stroke-width="0.6" opacity="0.5"/>
    <line x1="78" y1="170" x2="100" y2="150" stroke="#F0EEE6" stroke-width="0.6" opacity="0.5"/>
    <line x1="122" y1="170" x2="100" y2="150" stroke="#F0EEE6" stroke-width="0.6" opacity="0.5"/>

    <circle cx="100" cy="125" r="4" fill="url(#emblem-elegant)"/>
    <rect x="96" y="135" width="8" height="30" rx="2" fill="url(#emblem-elegant)"/>

    <circle cx="100" cy="150" r="26" fill="none" stroke="#C9A876" stroke-width="1" opacity="0.6"/>
    <circle cx="100" cy="150" r="30" fill="none" stroke="#F0EEE6" stroke-width="0.4" opacity="0.4" stroke-dasharray="2 3"/>
  </g>
</svg>
